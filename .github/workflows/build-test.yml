name: Build and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: [self-hosted, Linux, X64, home-lab, ci]
    defaults:
      run:
        working-directory: repo

    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: repo/uv.lock

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest -v

      - name: Build package
        run: uv build
